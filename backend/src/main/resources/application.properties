server.port=4000
spring.main.web-application-type=servlet
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

ai.service.url=http://localhost:5001
ai.service.connect-timeout-ms=3000
ai.service.response-timeout-s=60

auth.token=dev-token-123

# Graceful shutdown: drain in-flight requests before the JVM exits (30 s max)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Actuator health endpoint at /actuator/health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
